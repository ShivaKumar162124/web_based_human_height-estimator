<!DOCTYPE html>
<html>
<head>
    <title>Height Estimation - Select Points</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <h1>Height Estimation - Image Selection</h1>

<h2>Instructions:</h2>
<p>1️⃣Click top and bottom of the reference object</p>
<p>2️⃣Click head and foot of the person</p>

    <input type="file" accept="image/*" id="imageInput">
    <br><br>

    <canvas id="canvas" style="border:1px solid #ccc;"></canvas>

    <br><br>

    <label>Reference Object Height (cm)</label>
<input 
    type="number" 
    id="refHeight" 
    placeholder="Enter height in cm"
    min="1"
    max="300"
    step="0.1"
    required
>
    <br><br>

    <button onclick="calculateHeight()">Calculate Height</button>

    <br><br>

    <a href="index.html">
        <button>Back to Home</button>
    </a>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let image = new Image();
let points = [];

document.getElementById("imageInput").addEventListener("change", function(e) {
    let reader = new FileReader();
    reader.onload = function(event) {
        image.onload = function() {

    let maxWidth = 380;   // slightly less than container width
    let scale = 1;

    if (image.width > maxWidth) {
        scale = maxWidth / image.width;
    }

    canvas.width = image.width * scale;
    canvas.height = image.height * scale;

    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
}
        image.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
});

canvas.addEventListener("click", function(event) {

    if (points.length === 4) return;

    let rect = canvas.getBoundingClientRect();
    let x = event.clientX - rect.left;
    let y = event.clientY - rect.top;

    points.push({x, y});

    // Draw point
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, 2 * Math.PI);
    ctx.fill();

    // Label point number
    ctx.fillStyle = "blue";
    ctx.font = "14px Arial";
    ctx.fillText(points.length, x + 8, y - 8);

    // Draw line after every 2 clicks
    if (points.length === 2 || points.length === 4) {
        ctx.strokeStyle = "green";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(points[points.length - 2].x, points[points.length - 2].y);
        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
        ctx.stroke();
    }

});

function distance(p1, p2) {
    return Math.sqrt(
        Math.pow(p2.x - p1.x, 2) +
        Math.pow(p2.y - p1.y, 2)
    );
}

function calculateHeight() {

    let refHeight = document.getElementById("refHeight").value;

    if (!refHeight || points.length < 4) {
    alert("Please enter reference height and select 4 points.");
    return;
}

    if (refHeight === "" || refHeight <= 0) {
        alert("Enter valid reference height.");
        return;
    }

    let refPixel = distance(points[0], points[1]);
    let personPixel = distance(points[2], points[3]);

    let ratio = refHeight / refPixel;
    let finalHeight = personPixel * ratio;

    window.location.href =
        "result.html?refHeight=" + refHeight +
        "&refPixel=" + refPixel +
        "&personPixel=" + personPixel +
        "&finalHeight=" + finalHeight;
}

</script>

</div>
</body>
</html>
